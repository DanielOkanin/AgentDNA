<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Chat with Agent 🤖</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-start: #0a0f1e;
      --bg-end: #1a0a2e;
      --violet: #0d9488;
      --indigo: #14b8a6;
      --purple: #14b8a6;
      --text: #e8ecf1;
      --text-muted: #8896ab;
      --glow: rgba(13, 148, 136, 0.3);
      --glass: rgba(13, 148, 136, 0.05);
      --glass-border: rgba(13, 148, 136, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Animated grain */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.5;
      animation: grain 8s steps(10) infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -10%); }
      20% { transform: translate(-15%, 5%); }
      30% { transform: translate(7%, -25%); }
      40% { transform: translate(-5%, 25%); }
      50% { transform: translate(-15%, 10%); }
      60% { transform: translate(15%, 0%); }
      70% { transform: translate(0%, 15%); }
      80% { transform: translate(3%, 35%); }
      90% { transform: translate(-10%, 10%); }
    }

    .chat-container {
      max-width: 800px;
      width: 100%;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .chat-header {
      padding: 20px 24px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-header-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 12px var(--glow);
    }

    .agent-details {
      flex: 1;
    }

    .agent-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .agent-status {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .back-btn {
      padding: 8px 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      font-family: inherit;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .chat-disclaimer {
      padding: 12px 20px;
      background: rgba(13, 148, 136, 0.1);
      border-left: 3px solid var(--violet);
      margin: 16px 24px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      animation: messageIn 0.3s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: none;
      align-items: center;
      gap: 4px;
    }

    .typing-indicator.active {
      display: flex;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 20px 24px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .send-btn {
      padding: 14px 24px;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px var(--glow);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(139, 92, 246, 0.2);
      border-top-color: #0d9488;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Mobile */
    @media (max-width: 640px) {
      .chat-header {
        padding: 16px 20px;
      }

      .agent-avatar {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      .agent-name {
        font-size: 16px;
      }

      .message {
        max-width: 80%;
      }

      .chat-input-area {
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="chat-container"></div>

  <script>
    const API = window.location.origin;
    const pathParts = window.location.pathname.split('/');
    const username = pathParts[1].replace('@', '');
    const agentSlug = pathParts[2];

    let cloneId = null;

    // ═══════════════════════════════════════════
    // Load Chat
    // ═══════════════════════════════════════════

    async function loadChat() {
      const app = document.getElementById('app');

      if (!username || !agentSlug) {
        app.innerHTML = `
          <div class="loading">
            <div style="font-size: 48px;">⚠️</div>
            <div>Invalid URL</div>
          </div>
        `;
        return;
      }

      app.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>Loading chat...</div>
        </div>
      `;

      try {
        // Fetch clone data
        const publicUrl = `/@${username}/${agentSlug}`;
        const res = await fetch(`${API}/api/public/clone?url=${encodeURIComponent(publicUrl)}`);
        const data = await res.json();

        if (!data.ok) {
          throw new Error('Clone not found');
        }

        const { clone, profile } = data;
        cloneId = clone.id;

        const emoji = getAgentEmoji(profile.agent.displayName || clone.sourceAgent);
        const displayName = profile.agent.displayName || clone.sourceAgent;

        document.getElementById('page-title').textContent = `Chat with ${displayName} 🤖`;

        app.innerHTML = `
          <div class="chat-header">
            <div class="chat-header-info">
              <div class="agent-avatar">${emoji}</div>
              <div class="agent-details">
                <div class="agent-name">${displayName}</div>
                <div class="agent-status">
                  <span class="status-dot"></span>
                  Online — Public Clone
                </div>
              </div>
            </div>
            <a href="/@${username}" class="back-btn">← Back</a>
          </div>

          <div class="chat-disclaimer">
            🔓 <span>Talking to a public clone of ${displayName}. Private information is not accessible.</span>
          </div>

          <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
              Hi! I'm a public clone of ${displayName}. I can answer questions based on shared knowledge. What would you like to know?
            </div>
          </div>

          <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>

          <div class="chat-input-area">
            <input
              type="text"
              class="chat-input"
              id="chatInput"
              placeholder="Ask me anything..."
              onkeypress="handleKeyPress(event)"
              autofocus
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
        `;
      } catch (err) {
        app.innerHTML = `
          <div class="loading">
            <div style="font-size: 48px;">⚠️</div>
            <div>Error: ${err.message}</div>
            <a href="/@${username}" class="back-btn" style="margin-top: 16px;">← Go Back</a>
          </div>
        `;
      }
    }

    function getAgentEmoji(name) {
      const emojis = {
        'finance': '💰',
        'trading': '📈',
        'code': '💻',
        'health': '❤️',
        'fitness': '💪',
        'research': '🔬',
        'writing': '✍️',
        'design': '🎨',
        'music': '🎵',
      };

      const nameLower = name.toLowerCase();
      for (const [key, emoji] of Object.entries(emojis)) {
        if (nameLower.includes(key)) return emoji;
      }

      return '🤖';
    }

    // ═══════════════════════════════════════════
    // Chat Functions
    // ═══════════════════════════════════════════

    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();

      if (!message || !cloneId) return;

      // Add user message
      addMessage('user', message);
      input.value = '';

      // Show typing indicator
      const typingIndicator = document.getElementById('typingIndicator');
      typingIndicator.classList.add('active');

      try {
        const res = await fetch(`${API}/api/clones/${cloneId}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();

        // Hide typing indicator
        typingIndicator.classList.remove('active');

        if (data.ok) {
          addMessage('assistant', data.reply);
        } else {
          addMessage('assistant', 'Sorry, something went wrong. Please try again.');
        }
      } catch (err) {
        typingIndicator.classList.remove('active');
        addMessage('assistant', 'Error: Could not send message.');
      }
    }

    function addMessage(role, content) {
      const messagesContainer = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.textContent = content;
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Load on page load
    loadChat();
  </script>
</body>
</html>
